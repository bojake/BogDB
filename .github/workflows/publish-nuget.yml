name: Publish NuGet Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, for example 0.1.0-alpha.1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Pack and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid SemVer package version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore BogDb.slnx

      - name: Build
        run: dotnet build BogDb.slnx --configuration Release --no-restore /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test BogDb.Tests/BogDb.Tests.csproj --configuration Release --no-build --verbosity minimal

      - name: Pack
        shell: bash
        run: |
          mkdir -p artifacts/nuget
          while IFS= read -r project || [[ -n "$project" ]]; do
            [[ -z "$project" || "$project" =~ ^# ]] && continue
            dotnet pack "$project" --configuration Release --no-build --output artifacts/nuget /p:PackageVersion=${{ steps.version.outputs.version }}
          done < eng/package-projects.txt

      - name: Publish to NuGet.org
        shell: bash
        run: |
          if [[ -z "$NUGET_API_KEY" ]]; then
            echo "Missing NUGET_API_KEY repository secret." >&2
            exit 1
          fi

          dotnet nuget push artifacts/nuget/*.nupkg --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

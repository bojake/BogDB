name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-pack:
    name: Build, Test, Pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore BogDb.slnx

      - name: Build
        run: dotnet build BogDb.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test BogDb.Tests/BogDb.Tests.csproj --configuration Release --no-build --verbosity minimal

      - name: Pack
        shell: bash
        run: |
          mkdir -p artifacts/nuget
          while IFS= read -r project || [[ -n "$project" ]]; do
            [[ -z "$project" || "$project" =~ ^# ]] && continue
            dotnet pack "$project" --configuration Release --no-build --output artifacts/nuget
          done < eng/package-projects.txt

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: bogdb-nuget-packages
          path: artifacts/nuget/*.nupkg
